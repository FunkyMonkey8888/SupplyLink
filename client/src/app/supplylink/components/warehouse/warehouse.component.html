<!-- src/app/supplylink/components/warehouse/warehouse.component.html -->
 <app-navbar></app-navbar>
<div class="container py-3">
  <h2 class="mb-3">Create Warehouse</h2>

  <div class="alert alert-success py-2" *ngIf="successMessage">{{ successMessage }}</div>
  <div class="alert alert-danger py-2" *ngIf="serverError">{{ serverError }}</div>

  <form [formGroup]="warehouseForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Supplier ID</label>
      <input
        type="number"
        class="form-control"
        formControlName="supplierId"
        [class.is-invalid]="submitted && f['supplierId'].invalid"
      />
      <div class="invalid-feedback" *ngIf="submitted && f['supplierId'].errors">
        <span *ngIf="f['supplierId'].errors['required']">Supplier ID is required.</span>
        <span *ngIf="f['supplierId'].errors['min']">Supplier ID must be at least 1.</span>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Warehouse Name</label>
      <input
        type="text"
        class="form-control"
        formControlName="warehouseName"
        [class.is-invalid]="submitted && f['warehouseName'].invalid"
      />
      <div class="invalid-feedback" *ngIf="submitted && f['warehouseName'].errors">
        <span *ngIf="f['warehouseName'].errors['required']">Warehouse name is required.</span>
        <span *ngIf="f['warehouseName'].errors['specialChars']">
          Only letters, numbers, spaces, dashes (-), underscores (_), and dots (.) are allowed.
        </span>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Location</label>
      <input type="text" class="form-control" formControlName="location" />
    </div>

    <div class="mb-3">
      <label class="form-label">Capacity</label>
      <input
        type="number"
        class="form-control"
        formControlName="capacity"
        [class.is-invalid]="submitted && f['capacity'].invalid"
      />
      <div class="invalid-feedback" *ngIf="submitted && f['capacity'].errors">
        <span *ngIf="f['capacity'].errors['required']">Capacity is required.</span>
        <span *ngIf="f['capacity'].errors['min']">Capacity cannot be negative.</span>
      </div>
    </div>

    <div class="mt-4 d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="warehouseForm.invalid && submitted">
        Create
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="warehouseForm.reset({ supplierId: null, warehouseName: '', location: '', capacity: '' }); submitted = false; serverError = null; successMessage = null;"
      >
        Reset
      </button>
    </div>
  </form>
</div>
