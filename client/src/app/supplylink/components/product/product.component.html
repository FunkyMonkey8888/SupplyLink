<!-- src/app/supplylink/components/product/product.component.html -->
<form [formGroup]="productForm" (ngSubmit)="onSubmit()">
  <div>
    <label>Warehouse</label>
    <select formControlName="warehouse">
      <option [ngValue]="null">-- select --</option>
      <option *ngFor="let w of (warehouses | async)" [ngValue]="w">
        {{ w?.warehouseName }}
      </option>
    </select>
  </div>

  <div>
    <label>Product Name</label>
    <input type="text" formControlName="productName" />
  </div>

  <div>
    <label>Product Description</label>
    <input type="text" formControlName="productDescription" />
  </div>

  <div>
    <label>Quantity</label>
    <input type="text" formControlName="quantity" />
  </div>

  <div>
    <label>Price</label>
    <input type="text" formControlName="price" />
  </div>

  <button type="submit" [disabled]="productForm.invalid">Save</button>
</form>
